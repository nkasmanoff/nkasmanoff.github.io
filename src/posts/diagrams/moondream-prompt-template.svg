  <line x1="540" y1="50" x2="600" y2="50" stroke="#6b7280" stroke-width="1.5" fill="none" marker-end="url(#moondream-arrow)" />
  <text x="610" y="55" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#1f2937">boxes</text>

