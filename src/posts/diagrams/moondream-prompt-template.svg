    </marker>
  </defs>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, monospace" font-size="13" fill="#1f2937">
    <rect x="10" y="30" width="210" height="40" rx="4" fill="#ffffff" stroke="#9ca3af" />
    <text x="115" y="55" text-anchor="middle">BOS, target image patches</text>

    <rect x="230" y="30" width="110" height="40" rx="4" fill="#ffffff" stroke="#9ca3af" />
    <text x="285" y="55" text-anchor="middle">detect prefix</text>

    <rect x="350" y="30" width="60" height="40" rx="4" fill="#fef3c7" stroke="#d97706" stroke-dasharray="5 3" stroke-width="1.5" />
    <text x="380" y="56" text-anchor="middle" font-weight="700">???</text>

    <rect x="420" y="30" width="110" height="40" rx="4" fill="#ffffff" stroke="#9ca3af" />
